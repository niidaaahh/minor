<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Assisted Care for Elderly</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#e3f2fd 0%,#f3e5f5 50%,#fff9c4 100%);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.main-title{
font-size:2.5rem;
color:#2c3e50;
font-weight:600;
margin-bottom:10px;
}

.subtitle{
font-size:1.5rem;
color:#5a6c7d;
}

.login-container{
background:#ffffff;
border-radius:25px;
box-shadow:0 8px 30px rgba(0,0,0,0.12);
padding:45px 40px;
max-width:550px;
width:100%;
}

.role-selection{
margin-bottom:35px;
}

.role-label{
font-size:1.4rem;
color:#2c3e50;
font-weight:600;
margin-bottom:20px;
display:block;
}

.role-options{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.role-options input[type="radio"]{
position:absolute;
opacity:0;
}

.role-option{
flex:1;
min-width:140px;
}

.role-option label{
display:block;
padding:18px 20px;
background:#f5f5f5;
border:3px solid #e0e0e0;
border-radius:15px;
text-align:center;
font-size:1.3rem;
font-weight:600;
color:#5a6c7d;
cursor:pointer;
transition:all 0.3s ease;
}

.role-option input[type="radio"]:checked + label{
background:#bbdefb;
border-color:#42a5f5;
color:#1565c0;
}

.form-group{
margin-bottom:28px;
}

.form-group label{
display:block;
font-size:1.3rem;
color:#2c3e50;
font-weight:600;
margin-bottom:10px;
}

.form-group input{
width:100%;
padding:18px 20px;
font-size:1.2rem;
border:3px solid #e0e0e0;
border-radius:12px;
background:#fafafa;
}

.form-group input:focus{
outline:none;
border-color:#42a5f5;
background:#ffffff;
}

.login-button{
width:100%;
padding:20px;
font-size:1.4rem;
font-weight:600;
color:#ffffff;
background:linear-gradient(135deg,#66bb6a 0%,#43a047 100%);
border:none;
border-radius:12px;
cursor:pointer;
margin-top:10px;
}

.back-link{
text-align:center;
margin-top:25px;
}

.back-link a{
color:#5a6c7d;
font-size:1.2rem;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h1 class="main-title">AI Assisted Care for Elderly</h1>
<p class="subtitle">Secure Login</p>
</div>

<div class="login-container">

<form action="elderly-care-backend/login.php" method="POST" onsubmit="saveUserId()">

<div class="role-selection">
<span class="role-label">Select Your Role</span>

<div class="role-options">

<div class="role-option">
<input type="radio" id="role-user" name="role" value="user" required>
<label for="role-user">User</label>
</div>

<div class="role-option">
<input type="radio" id="role-caregiver" name="role" value="caregiver">
<label for="role-caregiver">Caregiver</label>
</div>

<div class="role-option">
<input type="radio" id="role-admin" name="role" value="admin">
<label for="role-admin">Admin</label>
</div>

</div>
</div>

<div class="form-group">
<label>User ID</label>
<input type="text" id="userId" name="userId" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="login-button">Login</button>

</form>

<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>

</div>

<script>
function saveUserId(){
let userId=document.getElementById("userId").value;
localStorage.setItem("userId",userId);
}
</script>

</body>
</html>
